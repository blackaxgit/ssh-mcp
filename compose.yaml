# Docker Compose configuration for ssh-mcp MCP server
# Compose V2 format (no version key)
#
# Two services are defined:
#   * ssh-mcp       — default stdio transport, launched as a subprocess by
#                     an MCP client via ``docker compose run``.
#   * ssh-mcp-http  — MCP streamable HTTP transport with bearer-token
#                     authentication, suitable for shared-team or
#                     containerized deployments. Commented out by default.
#
# Run the stdio service:      docker compose run --rm ssh-mcp
# Run the HTTP service:       uncomment the block below, set SSH_MCP_HTTP_TOKEN,
#                             then: docker compose up ssh-mcp-http

services:
  ssh-mcp:
    # Build from local Dockerfile (production-ready multi-stage)
    build:
      context: .
      dockerfile: Dockerfile

    # Enable stdin/stdout for MCP stdio protocol transport
    # The MCP protocol communicates via standard input/output
    stdin_open: true

    # Volume mounts for configuration and SSH credentials
    volumes:
      # Server configuration (read-only)
      # Contains host definitions, credentials, execution rules
      - ./config/servers.toml:/config/servers.toml:ro

      # User SSH keys and config (read-only)
      # Maps host machine ~/.ssh to container for key-based authentication
      - ~/.ssh:/home/sshmcp/.ssh:ro

    # Environment configuration
    environment:
      # Point MCP server to the mounted config file
      SSH_MCP_CONFIG: /config/servers.toml
      # Ensure Python logs and MCP protocol messages go to stderr for container logging
      PYTHONUNBUFFERED: "1"

    # Restart policy: restart on failure but not if manually stopped
    # Prevents thrashing on configuration errors while respecting manual stops
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # HTTP transport (commented out by default — uncomment to enable)
  #
  # SECURITY:
  #   * Binding to 0.0.0.0 REQUIRES SSH_MCP_HTTP_TOKEN (enforced at startup).
  #   * Generate a strong token:  openssl rand -hex 32
  #   * Pass via a Docker secret or an env file — do NOT hardcode here.
  #   * Put the service behind a TLS reverse proxy (Caddy, Traefik, nginx)
  #     for production — raw uvicorn on port 8000 is HTTP, not HTTPS.
  #   * SSH_MCP_HTTP_ALLOWED_HOSTS must list any hostname clients will use
  #     in the Host header (DNS rebinding protection).
  #
  # Example client request:
  #   curl -H "Authorization: Bearer ${SSH_MCP_HTTP_TOKEN}" \
  #        -H "Host: ssh-mcp.internal" \
  #        http://localhost:8000/mcp
  # ---------------------------------------------------------------------------
  # ssh-mcp-http:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   ports:
  #     # Publish the HTTP port to the host. Put nginx/Caddy in front for TLS.
  #     - "8000:8000"
  #   volumes:
  #     - ./config/servers.toml:/config/servers.toml:ro
  #     - ~/.ssh:/home/sshmcp/.ssh:ro
  #   environment:
  #     SSH_MCP_CONFIG: /config/servers.toml
  #     PYTHONUNBUFFERED: "1"
  #     # Transport selection
  #     SSH_MCP_TRANSPORT: streamable-http
  #     # Bind to 0.0.0.0 inside the container so the published port works
  #     SSH_MCP_HTTP_HOST: "0.0.0.0"
  #     SSH_MCP_HTTP_PORT: "8000"
  #     # Stateless mode is recommended for containers (no per-client session state)
  #     SSH_MCP_HTTP_STATELESS: "true"
  #     # Structured JSON logs for centralized aggregation (Loki, Datadog, etc.)
  #     SSH_MCP_LOG_FORMAT: "json"
  #     # uvicorn tuning — survive bursty keepalive traffic (v0.4.1+)
  #     # Default in the image is already 2s keepalive / 256 concurrency /
  #     # 128 backlog. Override here only if your traffic pattern differs.
  #     # SSH_MCP_HTTP_KEEPALIVE_TIMEOUT: "2"
  #     # SSH_MCP_HTTP_LIMIT_CONCURRENCY: "256"
  #     # SSH_MCP_HTTP_BACKLOG: "128"
  #     # Optional: extend DNS-rebinding allowlist for your internal hostname
  #     # SSH_MCP_HTTP_ALLOWED_HOSTS: "ssh-mcp.internal:*"
  #   # Prefer file-based token delivery over environment variable.
  #   # With Docker secrets:
  #   # secrets:
  #   #   - ssh_mcp_token
  #   # environment:
  #   #   SSH_MCP_HTTP_TOKEN_FILE: /run/secrets/ssh_mcp_token
  #   # Raise the fd limit from Docker's default 1024 so bursty clients
  #   # don't exhaust the accept queue. A single n8n workflow can open
  #   # 100+ concurrent HTTP/1.1 connections under load.
  #   ulimits:
  #     nofile:
  #       soft: 65536
  #       hard: 65536
  #   # Load the bearer token from a .env file (never commit it)
  #   # Create .env.ssh-mcp with: SSH_MCP_HTTP_TOKEN=<32+ char random value>
  #   env_file:
  #     - .env.ssh-mcp
  #   restart: unless-stopped
  #   # Healthcheck: inherited from the Dockerfile ``HEALTHCHECK`` directive
  #   # which runs ``ssh-mcp healthcheck``. The subcommand auto-detects the
  #   # transport from SSH_MCP_TRANSPORT and performs a real MCP initialize
  #   # handshake in HTTP mode — no inline Python or curl needed.
  #   #
  #   # To override (e.g. shorter interval), uncomment:
  #   # healthcheck:
  #   #   test: ["CMD", "ssh-mcp", "healthcheck"]
  #   #   interval: 15s
  #   #   timeout: 5s
  #   #   retries: 3
  #   #   start_period: 10s
